name = "my-first-apheriai" # 你的 Worker 名称，可以自定义
main = "src/index.js"     # 入口文件
compatibility_date = "2026-03-10"

[vars]
# 这里可以放环境变量，比如数据库连接信息等.
# DEEPSEEK_API_KEY = "sk-b69459f378b94422b9cd20836c75e4cb"  # 敏感信息如 DEEPSEEK_API_KEY 已在控制台作为 Secret 配置

# 新增：KV 命名空间（用于频率限制和日志）
[[kv_namespaces]]
binding = "KV_NAMESPACE"  # 必须与代码中的 env.KV_NAMESPACE 一致
id = "0660b79cb26045fbaac54cee3b92fa60"
